<!-- === MENÚ DE NAVEGACIÓN GLOBAL === -->
<header *ngIf="router.url !== '/perfil' && router.url !== '/perfil-reservas' && router.url !== '/mis-reservas' && router.url !== '/chat-soporte'">
  
  <!-- Cambiamos bg-transparent por nuestra nueva clase fondo-menu-oscuro -->
  <nav class="navbar navbar-expand-lg navbar-dark fondo-menu-oscuro py-3">
    <div class="container">
      
      <!-- Tu Logo -->
      <a class="navbar-brand texto-neon fw-bold fs-4" routerLink="/inicio">Barsa Los Olivos</a>

      <ul class="navbar-nav mx-auto gap-4">
        <li class="nav-item">
          <a class="nav-link text-white fw-medium" routerLink="/inicio" routerLinkActive="active">Inicio</a>
        </li>
        <li class="nav-item">
          <a class="nav-link text-white fw-medium" routerLink="/reservas" routerLinkActive="active">Reservas</a>
        </li>
        <li class="nav-item">
          <a class="nav-link text-white fw-medium" routerLink="/canchas" routerLinkActive="active">Canchas</a>
        </li>
        <li class="nav-item">
          <a class="nav-link text-white fw-medium" routerLink="/nosotros" routerLinkActive="active">Nosotros</a>
        </li>
      </ul>

      <!-- Tus botones de la derecha -->
      <div class="d-flex align-items-center gap-4">
        <a class="text-white text-decoration-none fw-medium" routerLink="/login">Login</a>
        <button class="btn boton-verde-fluido px-4 py-2" routerLink="/reservas">Reservas ahora</button>
      </div>

    </div>
  </nav>

</header>
