<div class="contenedor-reservas container-fluid py-5 px-md-5">
  <div class="row justify-content-center">
    
    <div class="col-lg-3 pe-lg-4 mb-4 mb-lg-0">
      <h1 class="titulo-blanco mb-2">Encuentra tu<br>espacio</h1>
      <p class="texto-delgado-gris mb-4">Selecciona tu deporte, fecha y hora para ver la disponibilidad inmediata.</p>

      <div class="caja-filtros">
        <h6 class="etiqueta-filtro">DEPORTE</h6>
        <div class="d-flex gap-3 mb-4">
          <div class="opcion-cuadro activo">
            <i class="bi bi-dribbble fs-4 mb-1"></i>
            <span>Fútbol</span>
          </div>
          <div class="opcion-cuadro">
            <i class="bi bi-circle fs-4 mb-1"></i>
            <span>Vóley</span>
          </div>
        </div>

        <h6 class="etiqueta-filtro">PREFERENCIA DE HORARIO</h6>
        <div class="d-flex flex-wrap gap-2">
          <button class="btn-pildora">Mañana</button>
          <button class="btn-pildora activo">Tarde / Noche</button>
          <button class="btn-pildora">Madrugada</button>
        </div>
      </div>
    </div>

    <div class="col-lg-7">
      <div class="caja-calendario-oscura">
        
        <div class="leyenda-calendario mb-3 d-flex justify-content-end gap-3">
          <span class="item-leyenda"><span class="punto verde"></span> Disponible</span>
          <span class="item-leyenda"><span class="punto gris"></span> Ocupado</span>
        </div>

        <full-calendar [options]="calendarOptions"></full-calendar>

      </div>
    </div>

  </div>
</div>
